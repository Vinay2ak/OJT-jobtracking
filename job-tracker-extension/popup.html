<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup">
        <div class="popup__header">
            <div class="popup__logo">💼</div>
            <h1 class="popup__title">Job Tracker</h1>
        </div>

        <!-- Logged Out State -->
        <div id="loginSection">
            <div id="errorMsg" class="popup__error"></div>

            <!-- Step 1: Email -->
            <div id="popupEmailStep">
                <p class="popup__desc">Sign in to start tracking</p>
                <input type="email" id="popupEmail" class="popup__input" placeholder="Your email address">
                <button id="popupSendOtp" class="popup__btn popup__btn--primary">Send OTP</button>
            </div>

            <!-- Step 2: OTP -->
            <div id="popupOtpStep" style="display:none;">
                <p class="popup__desc">Enter the OTP sent to your email</p>
                <input type="text" id="popupOtp" class="popup__input" placeholder="6-digit OTP" maxlength="6">
                <button id="popupVerifyOtp" class="popup__btn popup__btn--primary">Sign In</button>
                <button id="popupBackBtn" class="popup__btn popup__btn--secondary">← Back</button>
            </div>
        </div>

        <!-- Logged In State -->
        <div id="loggedInSection" style="display:none;">
            <div class="popup__status">
                <div class="popup__status-dot"></div>
                <span>Connected</span>
            </div>
            <p class="popup__user" id="popupUserEmail">user@email.com</p>
            <p class="popup__desc">Extension is actively tracking your job applications.</p>

            <div class="popup__stats" id="popupStats">
                <div class="popup__stat">
                    <div class="popup__stat-value" id="popupTotalJobs">-</div>
                    <div class="popup__stat-label">Total</div>
                </div>
                <div class="popup__stat">
                    <div class="popup__stat-value popup__stat-value--blue" id="popupApplied">-</div>
                    <div class="popup__stat-label">Applied</div>
                </div>
                <div class="popup__stat">
                    <div class="popup__stat-value popup__stat-value--green" id="popupOffers">-</div>
                    <div class="popup__stat-label">Offers</div>
                </div>
            </div>

            <button id="openDashboard" class="popup__btn popup__btn--primary">Open Dashboard</button>
            <button id="logoutBtn" class="popup__btn popup__btn--secondary">Logout</button>
        </div>

        <div class="popup__footer">
            Tracking: LinkedIn · Naukri · Indeed
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
