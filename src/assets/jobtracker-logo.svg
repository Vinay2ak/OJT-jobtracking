<svg width="200" height="40" viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">JobTracker logo</title>
  <desc id="logoDesc">A simple professional logo with an icon and wordmark.</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Icon: stylized briefcase with upward arrow -->
  <g transform="translate(4,3)">
    <rect x="0" y="6" width="24" height="18" rx="3" fill="url(#g)" />
    <rect x="2" y="8" width="20" height="14" rx="2" fill="rgba(255,255,255,0.06)" />
    <path d="M8 14 L12 10 L16 14" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <rect x="6" y="2" width="12" height="6" rx="2" fill="url(#g)" />
  </g>
  <!-- Wordmark -->
  <g transform="translate(36,26)">
    <text x="0" y="0" font-family="Inter, Roboto, Arial, sans-serif" font-weight="700" font-size="18" fill="#0f172a">Job</text>
    <text x="36" y="0" font-family="Inter, Roboto, Arial, sans-serif" font-weight="700" font-size="18" fill="url(#g)">Tracker</text>
  </g>
</svg>
